# find_job 配置文件
# 金字塔模型：求职导向的信息收集系统
# 负责第1层：求职（最高优先级）

# 关键词配置（金字塔模型）
keywords:
  job_hunting:
    # 核心关键词（金字塔关键词.md）
    - "嵌入式实习"
    - "C++实习"
    - "BSP实习"
    - "Linux驱动实习"
    - "校招 嵌入式"
    # 扩展关键词（相近岗位，避免漏掉机会）
    - "物联网实习"
    - "嵌入式软件实习"
    - "Linux应用实习"
    - "嵌入式开发"
    - "嵌入式软件工程师"

# 搜索城市配置
cities:
  - name: "深圳"
    code: "101280600"
    priority: 1
  - name: "上海"
    code: "101020100"
    priority: 2
  - name: "北京"
    code: "101010100"
    priority: 2
  - name: "杭州"
    code: "101210100"
    priority: 3
  - name: "成都"
    code: "101270100"
    priority: 3

# 平台配置
platforms:
  - name: "boss"
    enabled: true
    priority: 1
  - name: "liepin"
    enabled: true
    priority: 2
  - name: "lagou"
    enabled: true
    priority: 2
  - name: "niuke"
    enabled: true
    priority: 3
  - name: "zhaopin"
    enabled: true
    priority: 3
  - name: "shixiseng"
    enabled: true
    priority: 3

# 评分配置
scoring:
  threshold: 75
  model: "deepseek-chat"

# 过滤规则
filters:
  min_relevance_score: 0.15
  exclude_keywords:
    - "广告"
    - "推广"
    - "培训"
    - "外包"
    - "驻场"
    - "销售"
    - "讲师"
  time_range_hours: 24
  max_signals_per_day: 100

# 数据存储
storage:
  local_path: "./data"
  retention_days: 30

# 日志配置
logging:
  level: "INFO"
  file: "./logs/find_job.log"
  max_size_mb: 10
  backup_count: 5
