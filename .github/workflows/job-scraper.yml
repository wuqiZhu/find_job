name: Job Scraper - 岗位抓取与通知

on:
  schedule:
    - cron: '0 8 * * *'   # 每天早上8点
    - cron: '0 12 * * *'  # 每天中午12点
    - cron: '0 18 * * *'  # 每天下午6点
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pyyaml curl_cffi DrissionPage

      - name: Run job scraper
        env:
          BOSS_COOKIE: ${{ secrets.BOSS_COOKIE }}
          LIEPIN_COOKIE: ${{ secrets.LIEPIN_COOKIE }}
          ZHAOPIN_COOKIE: ${{ secrets.ZHAOPIN_COOKIE }}
          ZHAOPIN_AT: ${{ secrets.ZHAOPIN_AT }}
          ZHAOPIN_RT: ${{ secrets.ZHAOPIN_RT }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'https://api.deepseek.com/v1' }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || 'deepseek-chat' }}
          SCRAPE_MODE: ${{ secrets.SCRAPE_MODE || 'auto' }}
        run: python -m job_scraper.main
