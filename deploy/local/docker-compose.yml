version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n-job
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_HIRING_BANNER_ENABLED=false
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      - N8N_PAYLOAD_SIZE_MAX=50
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows

  postgres:
    image: postgres:16
    container_name: job-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobadmin
      POSTGRES_PASSWORD: job123456
      POSTGRES_DB: job_automation
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U jobadmin"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  n8n_data:
  pg_data:
